<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange's Game Hub</title>
    <style>
        :root {
            /* Orange theme variables */
            --bg-color: #120a05;
            --card-bg: #24140a;
            --accent-primary: #ff6a00;
            --accent-secondary: #ff9d00;
            --text-main: #e8dcc7;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html {
            background-color: #0f0518;
        }

        body {
            background-color: transparent;
            color: var(--text-main);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-swirl {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg at 50% 50%, #0f0518, #3c1053, #5a189a, #3c1053, #0f0518);
            filter: blur(120px);
            animation: swirl 25s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes swirl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            margin-top: 2rem;
        }

        h1 {
            color: var(--accent-primary);
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 106, 0, 0.4);
        }

        p.subtitle {
            margin-top: 0.5rem;
            font-size: 1.2rem;
            color: var(--accent-secondary);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 3rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 106, 0, 0.15);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(255, 106, 0, 0.3);
            border-color: var(--accent-primary);
        }

        .img-wrapper {
            width: 100%;
            height: 200px;
            background-color: #111;
            border-bottom: 2px solid var(--accent-secondary);
            position: relative;
            overflow: hidden;
        }

        .card-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            color: var(--white);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .btn {
            display: inline-block;
            margin-top: auto;
            padding: 0.8rem 1.5rem;
            background-color: transparent;
            color: var(--accent-primary);
            text-transform: uppercase;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            border: 2px solid var(--accent-primary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--accent-primary);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--accent-primary);
        }

        .footer-actions {
            display: flex;
            gap: 1.5rem;
            margin-top: auto;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-secondary {
            background-color: var(--card-bg);
            border-color: var(--accent-secondary);
            color: var(--accent-secondary);
        }

        .btn-secondary:hover {
            background-color: var(--accent-secondary);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--accent-secondary);
        }

        .unavailable-btn {
            position: relative;
            pointer-events: none;
        }

        .unavailable-btn::after {
            content: 'X';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff3333;
            font-family: sans-serif;
            font-weight: 900;
            border-radius: inherit;
            z-index: 10;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.8);
            background-color: rgba(18, 10, 5, 0.7);
            font-size: 2rem;
        }

        .version-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--accent-primary);
            color: var(--bg-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 0 10px rgba(255, 106, 0, 0.6);
            z-index: 100;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .grid-container { grid-template-columns: 1fr; }
        }

        /* CSS ART FOR GCTD NEW */
        .art-gctd-new {
            background-color: #8c5a35;
            width: 100%; height: 100%;
            position: relative;
        }
        .art-gctd-new .grass {
            position: absolute; bottom: 0; left: 0;
            width: 65%; height: 65%; background-color: #42854b;
        }
        .art-gctd-new .health-bar {
            position: absolute; top: 15%; right: 10%;
            width: 40px; height: 10px; background-color: #d12121;
            display: flex;
        }
        .art-gctd-new .health-bar-green {
            width: 25%; height: 100%; background-color: #2ed14e;
        }
        .art-gctd-new .cheese-icon {
            position: absolute; top: 30%; right: 12%;
            width: 25px; height: 25px; background-color: #e8cd31;
            border: 2px solid #8c7112;
        }
        .art-gctd-new .turret-base {
            position: absolute; bottom: 15%; left: 30%;
            width: 60px; height: 60px; background-color: #b0976d;
            border: 4px solid #333; display: flex; justify-content: center; align-items: center;
        }
        .art-gctd-new .turret-cheese {
            width: 45px; height: 45px; background-color: #ffd700;
        }
        .art-gctd-new .turret-gun {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 15px; height: 25px; background-color: #666;
        }

        /* CSS ART FOR GCTD LEGACY */
        .art-gctd-legacy {
            background-color: #4cdb64;
            width: 100%; height: 100%;
            position: relative;
        }
        .art-gctd-legacy .path {
            position: absolute; top: 35%; left: 0;
            width: 100%; height: 35%; background-color: #8c5a35;
        }
        .art-gctd-legacy .path-curve {
            position: absolute; top: 0; left: 0;
            width: 30%; height: 70%; background-color: #8c5a35;
            border-bottom-right-radius: 40px;
        }
        .art-gctd-legacy .enemy {
            position: absolute; width: 45px; height: 45px;
            background-color: #d66a18; border-radius: 50%;
            border: 2px solid #a34e0e;
        }
        .art-gctd-legacy .e1 { top: 10%; left: 10%; }
        .art-gctd-legacy .e2 { top: 40%; left: 10%; }
        .art-gctd-legacy .e3 { top: 45%; left: 25%; }
        .art-gctd-legacy .enemy-health {
            position: absolute; top: 30%; left: 25%;
            width: 30px; height: 8px; background-color: #d12121;
            display: flex;
        }
        .art-gctd-legacy .enemy-health-green {
            width: 40%; height: 100%; background-color: #2ed14e;
        }
        .art-gctd-legacy .health-bar-e1 {
            position: absolute; top: 35%; left: 12%;
            width: 35px; height: 8px; background-color: #2ed14e;
        }
        .art-gctd-legacy .turret {
            position: absolute; bottom: 5%; left: 45%;
            width: 50px; height: 50px; background-color: #ffd700;
            border: 4px solid #555;
        }

        /* CSS ART FOR PRACTOMETRY DASH */
        .art-dash {
            background-color: #0f1423;
            width: 100%; height: 100%;
            position: relative; overflow: hidden;
            border-bottom: 12px solid #ff5500;
        }
        .art-dash .grid-line {
            position: absolute; top: 0; bottom: 0;
            width: 1px; background-color: rgba(255, 85, 0, 0.2);
        }
        .art-dash .gl1 { left: 10%; } .art-dash .gl2 { left: 20%; } .art-dash .gl3 { left: 30%; }
        .art-dash .gl4 { left: 40%; } .art-dash .gl5 { left: 50%; } .art-dash .gl6 { left: 60%; }
        .art-dash .gl7 { left: 70%; } .art-dash .gl8 { left: 80%; } .art-dash .gl9 { left: 90%; }
        .art-dash .player {
            position: absolute; top: 30%; left: 30%;
            width: 35px; height: 35px; background-color: #ff5500;
            border: 3px solid white; transform: rotate(20deg);
        }
        .art-dash .eye {
            position: absolute; width: 6px; height: 6px; background-color: black; border-radius: 50%;
        }
        .art-dash .eye1 { top: 8px; left: 8px; }
        .art-dash .eye2 { top: 18px; left: 12px; }
        .art-dash .trail {
            position: absolute; width: 15px; height: 15px; background-color: rgba(255, 85, 0, 0.5); border-radius: 50%;
        }
        .art-dash .t1 { top: 25%; left: 22%; width: 12px; height: 12px; }
        .art-dash .t2 { top: 20%; left: 15%; width: 15px; height: 15px; }
        .art-dash .t3 { top: 18%; left: 8%; width: 18px; height: 18px; }
        .art-dash .spike {
            position: absolute; bottom: 0;
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 40px solid #42f5e0;
        }
        .art-dash .s1 { left: 15%; }
        .art-dash .s2 { left: 28%; }
        .art-dash .s3 { left: 41%; }
        
        /* CSS ART FOR BEAT MAKER */
        .art-beat {
            background-color: #212530;
            width: 100%; height: 100%;
            position: relative;
            padding: 10px;
            display: flex;
            align-items: center;
        }
        .art-beat .controls {
            width: 35%; display: flex; flex-direction: column; gap: 10px;
        }
        .art-beat .control-row {
            display: flex; flex-direction: column; align-items: flex-end; padding-right: 10px;
        }
        .art-beat .label {
            color: #5ce695; font-size: 10px; font-weight: bold; margin-bottom: 2px;
        }
        .art-beat .slider-group {
            display: flex; gap: 5px;
        }
        .art-beat .slider {
            width: 30px; height: 4px; background-color: #333; border-radius: 2px; position: relative;
        }
        .art-beat .slider-knob {
            position: absolute; top: -3px; left: 15px; width: 10px; height: 10px; background-color: #4da6ff; border-radius: 50%;
        }
        .art-beat .pads {
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); gap: 5px; width: 65%; height: 90%;
        }
        .art-beat .pad {
            background-color: #12141a; border-radius: 4px; border: 1px solid #333;
        }
        .art-beat .pad.active {
            background-color: #ff66b3; box-shadow: 0 0 10px rgba(255, 102, 179, 0.8); border: 1px solid white;
        }

        /* CSS ART FOR FRUITY N' SUS */
        .art-fruity {
            background-color: #0d0d0f; /* Space background */
            width: 100%; height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .art-fruity .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 160px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 160px 120px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 200px 50px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 250px 150px, #fff, rgba(0,0,0,0));
            opacity: 0.5;
        }

        /* ACTUAL FRUIT STYLES */
        .art-fruity .apple-real {
            position: absolute; left: 25%; top: 40%;
            width: 45px; height: 42px; background-color: #e62323;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: inset -6px -6px 12px rgba(0,0,0,0.4); z-index: 5;
        }
        .art-fruity .apple-stem {
            position: absolute; top: -12px; left: 20px;
            width: 4px; height: 15px; background-color: #4a2f18; border-radius: 2px;
        }
        .art-fruity .apple-leaf {
            position: absolute; top: -8px; left: 22px;
            width: 14px; height: 9px; background-color: #3bb53b;
            border-radius: 10px 0px 10px 0px; transform: rotate(-20deg);
        }
        .art-fruity .apple-face {
            position: absolute; top: 15px; left: 25px; display: flex; gap: 5px;
        }
        .art-fruity .apple-face::before, .art-fruity .apple-face::after {
            content: ''; width: 5px; height: 7px; background: #000; border-radius: 50%;
            transform: rotate(15deg); /* Angry slant */
        }
        .art-fruity .apple-face::after { transform: rotate(-15deg); }
        
        .art-fruity .knife-real {
            position: absolute; right: -28px; top: 20px;
            width: 25px; height: 7px; background-color: #d1d1d1;
            border-radius: 0 4px 4px 0; z-index: 4; transform: rotate(-15deg);
        }
        .art-fruity .knife-real::before {
            content: ''; position: absolute; left: -10px; top: -2px;
            width: 10px; height: 11px; background-color: #333; border-radius: 2px;
        }
        .art-fruity .knife-blood {
            position: absolute; right: 0; top: 0;
            width: 8px; height: 100%; background-color: #e62323; border-radius: 0 4px 4px 0;
        }

        /* Dead Banana Body */
        .art-fruity .banana-real {
            position: absolute; right: 25%; top: 52%;
            width: 32px; height: 28px; background-color: #f7e01b;
            border-radius: 4px 4px 15px 15px;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2); z-index: 5;
        }
        .art-fruity .banana-peel {
            position: absolute; bottom: 0; left: -12px;
            width: 55px; height: 15px; background-color: #e3cc14;
            border-radius: 50%; z-index: 4;
        }
        .art-fruity .banana-bone {
            position: absolute; top: -14px; left: 10px;
            width: 10px; height: 15px; background-color: #e8e8e8;
            border-radius: 3px; z-index: 6;
        }
        .art-fruity .banana-bone::before, .art-fruity .banana-bone::after {
            content: ''; position: absolute; top: -6px;
            width: 9px; height: 9px; background-color: #e8e8e8; border-radius: 50%;
        }
        .art-fruity .banana-bone::before { left: -4px; }
        .art-fruity .banana-bone::after { right: -4px; }

        /* CSS ART FOR COMING SOON */
        .art-coming-soon {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #3a1505 0%, #120a05 100%);
        }
        .art-coming-soon span {
            font-size: 6rem;
            color: rgba(255, 106, 0, 0.2);
            font-weight: 900;
            animation: pulse-q 2s infinite ease-in-out;
        }
        @keyframes pulse-q {
            0% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 1; text-shadow: 0 0 25px var(--accent-primary); }
            100% { transform: scale(1); opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="bg-swirl"></div>
    <div class="version-badge">Beta 1.0</div>

    <header>
        <h1>Orange's Game Hub</h1>
        <p class="subtitle">Select a project to launch</p>
    </header>

    <div class="grid-container">
        
        <!-- GCTD -->
        <div class="card">
            <div class="img-wrapper">
                <div class="art-gctd-new">
                    <div class="grass"></div>
                    <div class="health-bar"><div class="health-bar-green"></div></div>
                    <div class="cheese-icon"></div>
                    <div class="turret-base">
                        <div class="turret-cheese"></div>
                        <div class="turret-gun"></div>
                    </div>
                </div>
            </div>
            <div class="card-content">
                <h2 class="card-title">Grilled Cheese Tower Defense</h2>
                <a href="https://gctdmaker.github.io/grilledcheesetd.github.io/" target="_blank" class="btn">Play Game</a>
            </div>
        </div>

        <!-- GCTD Legacy -->
        <div class="card">
            <div class="img-wrapper">
                <div class="art-gctd-legacy">
                    <div class="path-curve"></div>
                    <div class="path"></div>
                    <div class="enemy e1"></div>
                    <div class="enemy e2"></div>
                    <div class="enemy e3"></div>
                    <div class="enemy-health">
                        <div class="enemy-health-green"></div>
                    </div>
                    <div class="health-bar-e1"></div>
                    <div class="turret"></div>
                </div>
            </div>
            <div class="card-content">
                <h2 class="card-title">GCTD Legacy</h2>
                <a href="https://gctdmaker.github.io/GCTDlegacy/" target="_blank" class="btn">Play Classic</a>
            </div>
        </div>

        <!-- Practometry Dash -->
        <div class="card">
            <div class="img-wrapper">
                <div class="art-dash">
                    <div class="grid-line gl1"></div><div class="grid-line gl2"></div><div class="grid-line gl3"></div>
                    <div class="grid-line gl4"></div><div class="grid-line gl5"></div><div class="grid-line gl6"></div>
                    <div class="grid-line gl7"></div><div class="grid-line gl8"></div><div class="grid-line gl9"></div>
                    
                    <div class="trail t3"></div>
                    <div class="trail t2"></div>
                    <div class="trail t1"></div>
                    
                    <div class="player">
                        <div class="eye eye1"></div>
                        <div class="eye eye2"></div>
                    </div>
                    
                    <div class="spike s1"></div>
                    <div class="spike s2"></div>
                    <div class="spike s3"></div>
                </div>
            </div>
            <div class="card-content">
                <h2 class="card-title">Practometry Dash</h2>
                <a href="https://gctdmaker.github.io/Practometry-Dash/" target="_blank" class="btn">Play Game</a>
            </div>
        </div>

        <!-- Beat Maker -->
        <div class="card">
            <div class="img-wrapper">
                <div class="art-beat">
                    <div class="controls">
                        <div class="control-row">
                            <div class="label">HI-HAT</div>
                            <div class="slider-group">
                                <div class="slider"><div class="slider-knob" style="left:5px"></div></div>
                                <div class="slider"><div class="slider-knob" style="left:20px"></div></div>
                            </div>
                        </div>
                        <div class="control-row">
                            <div class="label">SNARE</div>
                            <div class="slider-group">
                                <div class="slider"><div class="slider-knob" style="left:10px"></div></div>
                                <div class="slider"><div class="slider-knob" style="left:8px"></div></div>
                            </div>
                        </div>
                        <div class="control-row">
                            <div class="label">KICK</div>
                            <div class="slider-group">
                                <div class="slider"><div class="slider-knob" style="left:25px"></div></div>
                                <div class="slider"><div class="slider-knob" style="left:15px"></div></div>
                            </div>
                        </div>
                    </div>
                    <div class="pads">
                        <div class="pad active"></div><div class="pad active"></div><div class="pad active"></div><div class="pad active"></div>
                        <div class="pad"></div><div class="pad active"></div><div class="pad"></div><div class="pad"></div>
                        <div class="pad active"></div><div class="pad"></div><div class="pad"></div><div class="pad active"></div>
                    </div>
                </div>
            </div>
            <div class="card-content">
                <h2 class="card-title">Beat Maker</h2>
                <a href="https://gctdmaker.github.io/Beat-Maker/" target="_blank" class="btn">Launch App</a>
            </div>
        </div>

        <!-- Fruity n' Sus -->
        <div class="card">
            <div class="img-wrapper">
                <div class="art-fruity">
                    <div class="stars"></div>
                    
                    <!-- Apple Impostor -->
                    <div class="apple-real">
                        <div class="apple-stem"></div>
                        <div class="apple-leaf"></div>
                        <div class="apple-face"></div>
                        <div class="knife-real"><div class="knife-blood"></div></div>
                    </div>

                    <!-- Banana Victim (Half-eaten/Cut body) -->
                    <div class="banana-real">
                        <div class="banana-bone"></div>
                        <div class="banana-peel"></div>
                    </div>
                    
                </div>
            </div>
            <div class="card-content">
                <h2 class="card-title">Fruity n' Sus</h2>
                <a href="https://gctdmaker.github.io/fruitynsus/" target="_blank" class="btn">Play Game</a>
            </div>
        </div>

        <!-- Coming Soon -->
        <div class="card">
            <div class="img-wrapper">
                <div class="art-coming-soon">
                    <span>?</span>
                </div>
            </div>
            <div class="card-content">
                <h2 class="card-title">Coming Soon...</h2>
                <a href="#" class="btn unavailable-btn">Locked</a>
            </div>
        </div>

    </div>

    <!-- Utility Buttons -->
    <div class="footer-actions">
        <a href="https://github.com/gctdMAKER/Orange-s-Game-Hub/issues" target="_blank" class="btn btn-secondary">Report Bugs</a>
        <a href="https://github.com/gctdMAKER/Commentsfororangesgamehub/issues" target="_blank" class="btn btn-secondary">Comments</a>
    </div>

</body>
</html>
